<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flow 뷰어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #f0f3fa;
    --border: #e2e8f5;
    --accent: #3b6cf8;
    --accent2: #6c8fff;
    --text: #1a2240;
    --text2: #5a6a8a;
    --text3: #8a9bbf;
    --shadow: 0 2px 16px rgba(59,108,248,0.08);
    --shadow-hover: 0 8px 32px rgba(59,108,248,0.16);
    --bubble-me: #3b6cf8;
    --bubble-other: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 헤더 ── */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 12px rgba(59,108,248,0.07);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #3b6cf8, #6c8fff);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .header-title { font-size: 15px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .mode-badge {
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
    background: #e8eeff; color: var(--accent);
  }

  /* ── 업로드 ── */
  #upload-section { padding: 60px 20px; }
  .upload-zone {
    max-width: 560px; margin: 0 auto;
    background: var(--surface); border: 2px dashed var(--border);
    border-radius: 20px; padding: 56px 40px; text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #f0f4ff; }
  .upload-icon { font-size: 44px; margin-bottom: 14px; }
  .upload-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
  .upload-desc { font-size: 13px; color: var(--text3); line-height: 1.7; }
  .upload-btn {
    margin-top: 22px; padding: 11px 28px;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: background 0.2s;
  }
  .upload-btn:hover { background: #2952d9; }
  #file-input { display: none; }

  /* ── 공통 툴바 ── */
  #main-section { display: none; }
  .toolbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 32px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input {
    width: 100%; padding: 7px 10px 7px 32px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; color: var(--text); font-family: inherit; outline: none;
    transition: border 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-ico { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; }
  .filter-select {
    padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; cursor: pointer;
  }
  .item-count { font-size: 12px; color: var(--text3); white-space: nowrap; }

  /* ════════════════════════════
     프로젝트 뷰
  ════════════════════════════ */
  #project-view { padding: 20px 32px; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: var(--accent2); }
  .card:hover::before { opacity: 1; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .avatar {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .meta-author { font-size: 12px; font-weight: 600; }
  .meta-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .card-title {
    font-size: 13px; font-weight: 600; line-height: 1.5; margin-bottom: 7px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-body {
    font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .comment-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; color: var(--text3);
    background: var(--surface2); padding: 2px 7px; border-radius: 5px;
  }

  /* 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,30,60,0.4); backdrop-filter: blur(4px);
    z-index: 200; align-items: flex-start; justify-content: center;
    padding: 40px 20px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 18px; width: 100%; max-width: 680px;
    box-shadow: 0 24px 80px rgba(20,30,80,0.2); animation: slideUp 0.22s ease; flex-shrink: 0;
  }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-top {
    padding: 20px 20px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-author-row { display: flex; align-items: center; gap: 10px; }
  .modal-avatar {
    width: 38px; height: 38px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
  }
  .modal-author-name { font-size: 14px; font-weight: 600; }
  .modal-author-date { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .modal-close {
    width: 30px; height: 30px; border-radius: 7px;
    background: var(--surface2); border: none; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text2);
  }
  .modal-close:hover { background: var(--border); }
  .modal-title { font-size: 16px; font-weight: 700; padding: 14px 20px; border-bottom: 1px solid var(--border); line-height: 1.5; }
  .modal-body-text { padding: 16px 20px; font-size: 13px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
  .modal-body-text table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; white-space: normal; }
  .modal-body-text th, .modal-body-text td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; vertical-align: top; }
  .modal-body-text th { background: var(--surface2); font-weight: 600; }
  .modal-body-text ul, .modal-body-text ol { padding-left: 20px; margin: 4px 0; }
  .modal-body-text li { margin: 2px 0; }
  .modal-body-text strong, .modal-body-text b { font-weight: 700; color: var(--text); }
  .modal-body-text em, .modal-body-text i { font-style: italic; }
  .modal-body-text blockquote { border-left: 3px solid var(--accent2); padding-left: 12px; margin: 8px 0; color: var(--text3); }
  .modal-body-text pre, .modal-body-text code { background: var(--surface2); border-radius: 4px; padding: 2px 5px; font-size: 12px; font-family: monospace; }
  .modal-body-text a { color: var(--accent); text-decoration: underline; }
  .modal-body-text p { margin: 4px 0; }
  .modal-comments { padding: 0 20px 20px; }
  .comments-label { font-size: 12px; font-weight: 700; color: var(--text3); padding: 12px 0 10px; border-top: 1px solid var(--border); }
  .comment-item { background: #f7f9ff; border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; margin-bottom: 7px; font-size: 12px; color: var(--text2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .comment-meta { font-size: 11px; color: var(--text3); margin-bottom: 3px; font-weight: 500; }

  /* ════════════════════════════
     채팅 뷰
  ════════════════════════════ */
  #chat-view { padding: 0; }
  .chat-container { max-width: 760px; margin: 0 auto; padding: 20px 20px 40px; }
  .date-divider {
    text-align: center; margin: 20px 0 12px;
    font-size: 11px; color: var(--text3); font-weight: 500;
    display: flex; align-items: center; gap: 10px;
  }
  .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 6px; }
  .msg-row.me { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, #a0b4ff, #c8d5ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #3b6cf8;
  }
  .msg-avatar.me-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .msg-col { display: flex; flex-direction: column; max-width: 68%; }
  .msg-row.me .msg-col { align-items: flex-end; }
  .msg-sender { font-size: 11px; color: var(--text3); margin-bottom: 3px; padding-left: 2px; }
  .bubble-wrap { display: flex; align-items: flex-end; gap: 6px; }
  .msg-row.me .bubble-wrap { flex-direction: row-reverse; }
  .bubble {
    padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.6;
    word-break: break-word; white-space: pre-wrap;
    background: var(--bubble-other); border: 1px solid var(--border); color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .msg-row.me .bubble {
    background: var(--bubble-me); color: #fff; border-color: var(--bubble-me);
  }
  .bubble-time { font-size: 10px; color: var(--text3); white-space: nowrap; padding-bottom: 2px; }
  /* 연속 메시지 */
  .msg-row.cont .msg-avatar { visibility: hidden; }
  .msg-row.cont .msg-sender { display: none; }

  /* 빈 상태 */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  @media (max-width: 600px) {
    .header { padding: 0 16px; }
    .toolbar { padding: 10px 16px; }
    #project-view { padding: 16px; }
    .cards-grid { grid-template-columns: 1fr; }
    .chat-container { padding: 12px 12px 32px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">💬</div>
    <div>
      <div class="header-title">Flow 뷰어</div>
      <div class="header-sub" id="header-sub">채팅 · 프로젝트 백업 파일 시각화</div>
    </div>
  </div>
  <div id="mode-badge" class="mode-badge" style="display:none"></div>
</div>

<!-- 업로드 -->
<div id="upload-section">
  <div class="upload-zone" id="drop-zone">
    <div class="upload-icon">📂</div>
    <div class="upload-title">CSV 파일을 불러오세요</div>
    <div class="upload-desc">
      flow_chat_*.csv 또는 flow_project_*.csv<br>
      드래그하거나 버튼으로 선택하세요<br>
      <small style="color:#b0b8d0">(파일 컬럼으로 채팅/프로젝트 자동 구분)</small>
    </div>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">파일 선택</button>
    <input type="file" id="file-input" accept=".csv"/>
  </div>
</div>

<!-- 메인 -->
<div id="main-section">
  <div class="toolbar" id="toolbar">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input type="text" id="search-input" placeholder="검색..."/>
    </div>
    <select class="filter-select" id="filter1"></select>
    <select class="filter-select" id="filter2"></select>
    <span class="item-count" id="item-count"></span>
  </div>
  <div id="project-view" style="display:none">
    <div class="cards-grid" id="cards-grid"></div>
    <div class="empty" id="proj-empty" style="display:none"><div class="empty-icon">🔍</div><div>검색 결과 없음</div></div>
  </div>
  <div id="chat-view" style="display:none">
    <div class="chat-container" id="chat-container"></div>
    <div class="empty" id="chat-empty" style="display:none"><div class="empty-icon">🔍</div><div>검색 결과 없음</div></div>
  </div>
</div>

<!-- 프로젝트 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-author-row">
        <div class="modal-avatar" id="m-avatar"></div>
        <div><div class="modal-author-name" id="m-name"></div><div class="modal-author-date" id="m-date"></div></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-body-text" id="m-body"></div>
    <div class="modal-comments" id="m-comments"></div>
  </div>
</div>

<script>
let mode = null; // 'chat' | 'project'
let allData = [];

// ── CSV 파싱 ──
function parseCSV(text) {
  const lines = text.split('\n');
  const headers = parseRow(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseRow(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}
function parseRow(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"' && !inQ) { inQ = true; }
    else if (c === '"' && inQ) { if (line[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
    else if (c === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += c;
  }
  res.push(cur); return res;
}

// ── 파일 로드 ──
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    let text = e.target.result;
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    const rows = parseCSV(text).filter(r => Object.values(r).some(v => v));
    // 컬럼으로 모드 판별
    const keys = Object.keys(rows[0] || {});
    mode = keys.includes('제목') ? 'project' : 'chat';
    allData = rows;
    initUI(file.name);
  };
  reader.readAsText(file, 'UTF-8');
}

document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

// ── UI 초기화 ──
function initUI(filename) {
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('main-section').style.display = 'block';
  const badge = document.getElementById('mode-badge');
  badge.style.display = 'block';
  badge.textContent = mode === 'project' ? '📋 프로젝트' : '💬 채팅';
  document.getElementById('header-sub').textContent = filename;

  const f1 = document.getElementById('filter1');
  const f2 = document.getElementById('filter2');
  f1.innerHTML = ''; f2.innerHTML = '';

  if (mode === 'project') {
    document.getElementById('project-view').style.display = 'block';
    document.getElementById('chat-view').style.display = 'none';
    document.getElementById('search-input').placeholder = '제목, 내용, 작성자 검색...';

    // 작성자 필터
    f1.innerHTML = '<option value="">전체 작성자</option>';
    [...new Set(allData.map(p => p['작성자']).filter(Boolean))].sort()
      .forEach(a => f1.appendChild(new Option(a, a)));

    // 연월 필터
    f2.innerHTML = '<option value="">전체 기간</option>';
    [...new Set(allData.map(p => (p['날짜']||'').slice(0,7)).filter(Boolean))].sort().reverse()
      .forEach(d => f2.appendChild(new Option(d, d)));

    renderProject(allData);
  } else {
    document.getElementById('chat-view').style.display = 'block';
    document.getElementById('project-view').style.display = 'none';
    document.getElementById('search-input').placeholder = '메시지 내용, 발신자 검색...';

    // 발신자 필터
    f1.innerHTML = '<option value="">전체 발신자</option>';
    [...new Set(allData.map(p => p['발신자']).filter(Boolean))].sort()
      .forEach(a => f1.appendChild(new Option(a, a)));

    // 날짜 필터
    f2.innerHTML = '<option value="">전체 날짜</option>';
    [...new Set(allData.map(p => p['날짜']).filter(Boolean))].sort().reverse()
      .forEach(d => f2.appendChild(new Option(d, d)));

    renderChat(allData);
  }

  document.getElementById('search-input').addEventListener('input', filterAndRender);
  f1.addEventListener('change', filterAndRender);
  f2.addEventListener('change', filterAndRender);
}

function filterAndRender() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const f1 = document.getElementById('filter1').value;
  const f2 = document.getElementById('filter2').value;

  if (mode === 'project') {
    const filtered = allData.filter(p =>
      (!q || [p['제목'],p['내용'],p['작성자'],p['댓글']].some(v => (v||'').toLowerCase().includes(q))) &&
      (!f1 || p['작성자'] === f1) &&
      (!f2 || (p['날짜']||'').startsWith(f2))
    );
    renderProject(filtered);
  } else {
    const filtered = allData.filter(p =>
      (!q || [p['내용'],p['발신자']].some(v => (v||'').toLowerCase().includes(q))) &&
      (!f1 || p['발신자'] === f1) &&
      (!f2 || p['날짜'] === f2)
    );
    renderChat(filtered);
  }
}

// ════════════════════════════
// 프로젝트 렌더
// ════════════════════════════
// HTML → 미리보기용 텍스트 (태그 제거)
function htmlToPreview(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.innerText.replace(/\s+/g, ' ').trim();
}

function renderProject(posts) {
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('proj-empty');
  document.getElementById('item-count').textContent = posts.length + '건';
  grid.innerHTML = '';
  if (!posts.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  posts.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    const cCount = p['댓글'] ? p['댓글'].split(' | ').filter(c=>c.trim()).length : 0;
    // 내용_html(뷰어용) 또는 내용(일반용) 둘 다 지원
    const rawBody = p['내용_html'] || p['내용'] || '';
    const previewText = htmlToPreview(rawBody);
    card.innerHTML = `
      <div class="card-meta">
        <div class="avatar">${esc((p['작성자']||'?').slice(0,1))}</div>
        <div><div class="meta-author">${esc(p['작성자']||'')}</div><div class="meta-date">${esc(p['날짜']||'')}</div></div>
      </div>
      <div class="card-title">${esc(p['제목']||'(제목 없음)')}</div>
      <div class="card-body">${esc(previewText)}</div>
      ${cCount > 0 ? `<div class="comment-badge">💬 ${cCount}</div>` : ''}
    `;
    card.addEventListener('click', () => openModal(p));
    grid.appendChild(card);
  });
}

function openModal(p) {
  document.getElementById('m-avatar').textContent = (p['작성자']||'?').slice(0,1);
  document.getElementById('m-name').textContent = p['작성자']||'';
  document.getElementById('m-date').textContent = p['날짜']||'';
  document.getElementById('m-title').textContent = p['제목']||'(제목 없음)';

  // 내용_html(뷰어용 CSV) 우선, 없으면 내용(일반 CSV) 사용
  const bodyEl = document.getElementById('m-body');
  const rawBody = p['내용_html'] || p['내용'] || '';
  if (/<[a-z][\s\S]*>/i.test(rawBody)) {
    bodyEl.innerHTML = sanitizeHTML(rawBody);
  } else {
    bodyEl.textContent = rawBody;
  }

  const mc = document.getElementById('m-comments');
  const comments = (p['댓글']||'').split(' | ').filter(c=>c.trim());
  mc.innerHTML = comments.length ? `<div class="comments-label">댓글 ${comments.length}개</div>` : '';
  comments.forEach(c => {
    const m = c.match(/^\[(.+?)\]\s*([\s\S]*)$/);
    const div = document.createElement('div');
    div.className = 'comment-item';
    if (m) {
      const commentBody = /<[a-z][\s\S]*>/i.test(m[2]) ? sanitizeHTML(m[2]) : esc(m[2]);
      div.innerHTML = `<div class="comment-meta">${esc(m[1])}</div>${commentBody}`;
    } else {
      div.textContent = c;
    }
    mc.appendChild(div);
  });
  document.getElementById('modal-overlay').classList.add('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal-overlay').classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open'); });

// ════════════════════════════
// 채팅 렌더 (말풍선)
// ════════════════════════════
function renderChat(msgs) {
  const container = document.getElementById('chat-container');
  const empty = document.getElementById('chat-empty');
  document.getElementById('item-count').textContent = msgs.length + '개';
  container.innerHTML = '';
  if (!msgs.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  let lastDate = '', lastSender = '', lastTime = '';

  msgs.forEach((m, i) => {
    const isMe = m['발신자'] === '나';
    const date = m['날짜'] || '';
    const sender = m['발신자'] || '';
    const time = m['시간'] || '';
    const body = m['내용'] || '';

    // 날짜 구분선
    if (date && date !== lastDate) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = date;
      container.appendChild(div);
      lastDate = date;
      lastSender = '';
    }

    // 연속 메시지 여부 (같은 발신자 + 같은 시간)
    const isCont = sender === lastSender && time === lastTime;
    lastSender = sender; lastTime = time;

    const row = document.createElement('div');
    row.className = 'msg-row' + (isMe ? ' me' : '') + (isCont ? ' cont' : '');

    const avatarEl = `<div class="msg-avatar${isMe ? ' me-avatar' : ''}">${esc(sender.slice(0,1))}</div>`;
    const senderEl = !isCont && !isMe ? `<div class="msg-sender">${esc(sender)}</div>` : '';

    row.innerHTML = `
      ${avatarEl}
      <div class="msg-col">
        ${senderEl}
        <div class="bubble-wrap">
          <div class="bubble">${esc(body)}</div>
          ${time ? `<div class="bubble-time">${esc(time)}</div>` : ''}
        </div>
      </div>
    `;
    container.appendChild(row);
  });
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sanitizeHTML(html) {
  const allowed = new Set(['p','br','b','strong','i','em','u','s','strike',
    'ul','ol','li','table','thead','tbody','tr','th','td',
    'h1','h2','h3','h4','h5','h6','blockquote','pre','code','span','div','a']);
  const allowedAttrs = new Set(['href','target','colspan','rowspan','style']);
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('script,style,iframe,object,embed,form,input,button').forEach(el => el.remove());
  doc.body.querySelectorAll('*').forEach(el => {
    if (!allowed.has(el.tagName.toLowerCase())) { el.replaceWith(...el.childNodes); return; }
    [...el.attributes].forEach(attr => {
      if (!allowedAttrs.has(attr.name.toLowerCase())) { el.removeAttribute(attr.name); return; }
      if (attr.name === 'href' && /^\s*javascript:/i.test(attr.value)) el.removeAttribute('href');
      if (attr.name === 'style' && /(expression|javascript|url)\s*\(/i.test(attr.value)) el.removeAttribute('style');
    });
    if (el.tagName.toLowerCase() === 'a') {
      el.setAttribute('target', '_blank');
      el.setAttribute('rel', 'noopener noreferrer');
    }
  });
  return doc.body.innerHTML;
}
